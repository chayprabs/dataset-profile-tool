services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://worker:8080
    ports:
      - "3000:3000"
    depends_on:
      - worker

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DATAPROFILE_MAX_UPLOAD_MB: 50
      DATAPROFILE_JOB_TTL_SECONDS: 900
    ports:
      - "8080:8080"
